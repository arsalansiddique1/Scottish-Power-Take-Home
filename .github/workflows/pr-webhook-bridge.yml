name: PR Webhook Bridge

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  webhook-review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Trigger webhook review
        id: trigger
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          REPO_FULL_NAME: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ACTION: ${{ github.event.action }}
          DELIVERY_ID: gha-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK_URL:-}" ]; then
            echo "Missing required secret: WEBHOOK_URL" >&2
            exit 1
          fi
          if [ -z "${WEBHOOK_SECRET:-}" ]; then
            echo "Missing required secret: WEBHOOK_SECRET" >&2
            exit 1
          fi

          payload=$(jq -nc \
            --arg action "$ACTION" \
            --arg repo "$REPO_FULL_NAME" \
            --argjson pr "$PR_NUMBER" \
            '{action:$action, repository:{full_name:$repo}, pull_request:{number:$pr}}')
          signature=$(printf '%s' "$payload" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -hex | sed 's/^.* //')

          response=$(curl -sS -X POST "${WEBHOOK_URL%/}/webhook/github" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: pull_request" \
            -H "X-GitHub-Delivery: $DELIVERY_ID" \
            -H "X-Hub-Signature-256: sha256=$signature" \
            -d "$payload")
          echo "response=$response" >> "$GITHUB_OUTPUT"

          run_id=$(echo "$response" | jq -r '.run_id // empty')
          if [ -z "$run_id" ]; then
            echo "Webhook did not return run_id. Response: $response" >&2
            exit 1
          fi
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Wait for webhook processing
        id: wait
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          RUN_ID: ${{ steps.trigger.outputs.run_id }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            status_json=$(curl -sS "${WEBHOOK_URL%/}/webhook/status/$RUN_ID")
            status=$(echo "$status_json" | jq -r '.status // "unknown"')
            echo "Attempt $attempt status=$status"
            if [ "$status" = "success" ]; then
              echo "status_json=$status_json" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "$status" = "failed" ]; then
              echo "Webhook review failed: $status_json" >&2
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for webhook run $RUN_ID" >&2
          exit 1

      - name: Download artifacts from webhook service
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          RUN_ID: ${{ steps.trigger.outputs.run_id }}
        run: |
          set -euo pipefail
          curl -sS -L "${WEBHOOK_URL%/}/webhook/artifacts/$RUN_ID" -o pr-review-artifacts.zip
          unzip -o pr-review-artifacts.zip -d webhook-artifacts

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pr-review-${{ steps.trigger.outputs.run_id }}
          path: webhook-artifacts/*
          if-no-files-found: error
